<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>验证VUE3和element-plus</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus@2/dist/index.full.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2/dist/index.css">
</head>

<body>
    <div id="app">
        <div> {{ message }}</div>        
    </div>
    <script>
        const { createApp, ref, onMounted } = Vue
        
        createApp({
            setup() {
                const message = ref('Hello Vue 3 with Composition API!')
                
                const getStockInfo = () => {
                    fetch('https://prod-cms.cloudgn.com/qs_svc/v1/cms_stock_start_rank?date=2026-03-13&page_num=1&page_size=20')
                        .then(resp => {
                            console.log(resp);
                            
                        })
                }
                
                onMounted(() => {
                    sessionStorage.setItem('vue', 'vue3')
                    getStockInfo()
                })
                
                return {
                    message,
                    getStockInfo
                }
            }
        }).use(ElementPlus).mount('#app')
    </script>
</body>

</html>
